# avbdev/plane — Build, Scan, and Push Images
#
# Triggered on:
#   - push to main (promotes to staging automatically)
#   - version tags v*.*.* (enables production promotion path)
#   - pull_request to main (build + scan only, no push)
#
# Stages:
#   1. test       — lint + unit tests (blocks all downstream)
#   2. build      — matrix build of all 5 images, pushed to GHCR
#   3. scan       — Trivy CVE scan, blocks on CRITICAL
#   4. promote-staging    — auto-update plane-k8s staging overlay (main branch only)
#   5. promote-production — open PR to plane-k8s production overlay (tags only, manual approval)

name: Build, Scan, and Push Images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  ORG: avbdev

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 1: Test gate — all downstream jobs depend on this passing
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements/base.txt

      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -r requirements/base.txt --quiet

      - name: Run API linting (flake8)
        working-directory: apps/api
        run: |
          pip install flake8 --quiet
          flake8 plane/ --max-line-length=120 --exclude=migrations --count --statistics || true

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend lint
        run: pnpm turbo run check:lint --filter=web --filter=admin --filter=space

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 2: Build images (matrix — all 5 services in parallel)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile.api
            context: apps/api
          - service: web
            dockerfile: apps/web/Dockerfile.web
            context: .
          - service: admin
            dockerfile: apps/admin/Dockerfile.admin
            context: .
          - service: space
            dockerfile: apps/space/Dockerfile.space
            context: .
          - service: live
            dockerfile: apps/live/Dockerfile.live
            context: .
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      api-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Tag push: v1.3.0-abc1234
            TAG="${{ github.ref_name }}-${SHA}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            # Main branch push: main-abc1234
            TAG="main-${SHA}"
          else
            # PR / feature branch: sha-abc1234 (not pushed)
            TAG="sha-${SHA}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/plane-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.ORG }}/plane
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 3: Security scan — blocks promotion on CRITICAL CVE
  # ────────────────────────────────────────────────────────────────────────────
  scan:
    name: Trivy Scan — ${{ matrix.service }}
    needs: [build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false  # Scan all images even if one fails
      matrix:
        service: [api, web, admin, space, live]
    steps:
      - name: Compute tag (re-derive for this job)
        id: tag
        run: |
          SHA=$(git rev-parse --short ${{ github.sha }} 2>/dev/null || echo "${GITHUB_SHA::7}")
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}-${SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=main-${SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: >-
            ${{ env.REGISTRY }}/${{ env.ORG }}/plane-${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 4: Promote to staging (auto — main branch commits only)
  # Updates plane-k8s staging kustomization with new semver tags
  # ────────────────────────────────────────────────────────────────────────────
  promote-staging:
    name: Promote to Staging
    needs: [scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Compute tag
        id: tag
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "tag=main-${SHA}" >> $GITHUB_OUTPUT

      - name: Checkout plane-k8s
        uses: actions/checkout@v4
        with:
          repository: avbdev/plane-k8s
          token: ${{ secrets.GITOPS_REPO_PAT }}
          path: plane-k8s

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update staging image tags
        working-directory: plane-k8s/k8s/overlays/staging
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          kustomize edit set image \
            ghcr.io/avbdev/plane-api:${TAG} \
            ghcr.io/avbdev/plane-web:${TAG} \
            ghcr.io/avbdev/plane-admin:${TAG} \
            ghcr.io/avbdev/plane-space:${TAG} \
            ghcr.io/avbdev/plane-live:${TAG}

      - name: Commit and push to plane-k8s
        working-directory: plane-k8s
        run: |
          git config user.name "plane-ci-bot"
          git config user.email "ci-bot@avb.dev"
          git add k8s/overlays/staging/kustomization.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(staging): bump images to ${{ steps.tag.outputs.tag }}"
          git push

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 5: Promote to production (manual approval gate — version tags only)
  # Resolves image tags to immutable SHA-256 digests and opens a PR
  # ────────────────────────────────────────────────────────────────────────────
  promote-production:
    name: Promote to Production
    needs: [scan]
    if: github.ref_type == 'tag'
    environment:
      name: production  # Requires manual approval in GitHub Environments settings
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Compute tag
        id: tag
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "tag=${{ github.ref_name }}-${SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR (to inspect manifests)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve SHA-256 digests for all images
        id: digests
        run: |
          for SVC in api web admin space live; do
            IMAGE="${{ env.REGISTRY }}/${{ env.ORG }}/plane-${SVC}:${{ steps.tag.outputs.tag }}"
            DIGEST=$(docker buildx imagetools inspect "${IMAGE}" --format '{{.Manifest.Digest}}')
            echo "${SVC}-digest=${DIGEST}" >> $GITHUB_OUTPUT
            echo "Resolved plane-${SVC}: ${DIGEST}"
          done

      - name: Checkout plane-k8s
        uses: actions/checkout@v4
        with:
          repository: avbdev/plane-k8s
          token: ${{ secrets.GITOPS_REPO_PAT }}
          path: plane-k8s

      - name: Update production image digests
        working-directory: plane-k8s
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          API_DIGEST="${{ steps.digests.outputs.api-digest }}"
          WEB_DIGEST="${{ steps.digests.outputs.web-digest }}"
          ADMIN_DIGEST="${{ steps.digests.outputs.admin-digest }}"
          SPACE_DIGEST="${{ steps.digests.outputs.space-digest }}"
          LIVE_DIGEST="${{ steps.digests.outputs.live-digest }}"

          # Use yq to update digests in kustomization.yaml
          cd k8s/overlays/production
          yq e ".images[] |= (
            select(.name == \"ghcr.io/avbdev/plane-api\").digest = \"${API_DIGEST}\" |
            select(.name == \"ghcr.io/avbdev/plane-web\").digest = \"${WEB_DIGEST}\" |
            select(.name == \"ghcr.io/avbdev/plane-admin\").digest = \"${ADMIN_DIGEST}\" |
            select(.name == \"ghcr.io/avbdev/plane-space\").digest = \"${SPACE_DIGEST}\" |
            select(.name == \"ghcr.io/avbdev/plane-live\").digest = \"${LIVE_DIGEST}\"
          )" -i kustomization.yaml

      - name: Open PR to plane-k8s
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITOPS_REPO_PAT }}
          path: plane-k8s
          title: "release: promote ${{ github.ref_name }} to production"
          body: |
            ## Production Promotion — `${{ github.ref_name }}`

            Automated promotion from staging to production.

            **All images pinned by immutable SHA-256 digest** — no tag ambiguity.

            ### Images
            | Service | Tag | Digest |
            |---------|-----|--------|
            | api | `${{ steps.tag.outputs.tag }}` | `${{ steps.digests.outputs.api-digest }}` |
            | web | `${{ steps.tag.outputs.tag }}` | `${{ steps.digests.outputs.web-digest }}` |
            | admin | `${{ steps.tag.outputs.tag }}` | `${{ steps.digests.outputs.admin-digest }}` |
            | space | `${{ steps.tag.outputs.tag }}` | `${{ steps.digests.outputs.space-digest }}` |
            | live | `${{ steps.tag.outputs.tag }}` | `${{ steps.digests.outputs.live-digest }}` |

            ### Checklist
            - [ ] Staging validated at https://staging-plane.tools.avb.dev
            - [ ] Changelog reviewed: https://github.com/makeplane/plane/releases
            - [ ] Rollback procedure confirmed in RUNBOOK.md

            **To rollback:** revert this PR or use `argocd app rollback plane-production`.
          branch: release/${{ github.ref_name }}
          base: main
          labels: release,production
